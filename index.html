<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Al Farabi Primary School</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #e0f2fe, #f0fdf4);
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: 100%;
      max-width: 760px;
      background: #ffffff;
      border-radius: 28px;
      padding: 42px 28px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.14);
      border: 1px solid rgba(14, 165, 233, 0.18);
    }

    .graphic {
      width: 150px;
      height: 150px;
      margin: 0 auto 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #38bdf8, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 28px rgba(34, 197, 94, 0.24);
      font-size: 74px;
    }

    .badge {
      display: inline-block;
      background: #ecfeff;
      color: #0369a1;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
      border: 1px solid #bae6fd;
    }

    h1 {
      font-size: clamp(34px, 6vw, 54px);
      line-height: 1.05;
      margin-bottom: 16px;
      color: #0f172a;
    }

    p {
      max-width: 560px;
      margin: 0 auto 30px;
      color: #475569;
      font-size: 18px;
      line-height: 1.7;
    }

    .main-button {
      display: inline-block;
      background: linear-gradient(135deg, #0284c7, #16a34a);
      color: #ffffff;
      text-decoration: none;
      padding: 18px 34px;
      border-radius: 18px;
      font-size: 20px;
      font-weight: 800;
      box-shadow: 0 12px 26px rgba(2, 132, 199, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .main-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 34px rgba(2, 132, 199, 0.34);
    }

    .note {
      margin-top: 24px;
      font-size: 14px;
      color: #64748b;
    }

    footer {
      margin-top: 34px;
      font-size: 13px;
      color: #94a3b8;
    }

    @media (max-width: 520px) {
      .page {
        padding: 34px 20px;
        border-radius: 22px;
      }

      .graphic {
        width: 120px;
        height: 120px;
        font-size: 58px;
      }

      p {
        font-size: 16px;
      }

      .main-button {
        width: 100%;
        padding: 17px 20px;
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="graphic" aria-hidden="true">🏫</div>

    <div class="badge">Primary School Learning Portal</div>

    <h1>Al Farabi Primary School</h1>

    <p>
      Welcome to our online school platform. Click the button below to open the learning and quiz system.
    </p>

    <a class="main-button" href="http://130.61.124.24:5006" target="_blank" rel="noopener noreferrer">
      Open School Platform
    </a>

    <div class="note">
      For students and teachers of Al Farabi Primary School.
    </div>

    <footer>
      © 2026 Al Farabi Primary School
    </footer>
  </main>
</body>
</html>
